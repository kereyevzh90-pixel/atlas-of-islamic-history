<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سيرة · Sirah Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* ── RESET & BASE ─────────────────────────────────────────── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body {
  background: #0b0907;
  height: 100vh;
  display: flex;
  align-items: stretch;
  justify-content: center;
  padding: 6px;
  font-family: 'Segoe UI', sans-serif;
  overscroll-behavior: none;
  overflow: hidden;
}

/* ── CARD ─────────────────────────────────────────────────── */
.card {
  width: 100%;
  max-width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  background: #1a1610;
  border: 1.5px solid #3a2e18;
  border-radius: clamp(8px, 1vw, 14px);
  overflow: hidden;
  box-shadow: 0 24px 80px rgba(0,0,0,0.85), 0 0 0 1px rgba(212,168,83,0.05);
}

/* ── HEADER ───────────────────────────────────────────────── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: clamp(10px,1.8vw,16px) clamp(14px,2.5vw,24px);
  border-bottom: 1px solid #2a2010;
  gap: 8px;
}
.header-left { display:flex; align-items:center; gap:clamp(8px,1.5vw,16px); }
.arabic { font-family:serif; font-size:clamp(1.4rem,3vw,2rem); color:#d4a853; line-height:1; }
.latin  { font-family:'Cinzel',serif; font-size:clamp(.6rem,1vw,.75rem); letter-spacing:3px; color:#7a6030; text-transform:uppercase; }
.header-right { display:flex; align-items:center; gap:8px; flex-shrink:0; }

.spread-btn {
  display:flex; align-items:center; gap:7px;
  background:transparent; border:1.5px solid #d4a853; color:#d4a853;
  border-radius:20px; padding:clamp(5px,1vw,8px) clamp(12px,2vw,18px);
  font-family:'Cinzel',sans-serif; font-size:clamp(.56rem,.8vw,.68rem);
  letter-spacing:2px; text-transform:uppercase; cursor:pointer;
  transition:background .2s;
}
.spread-btn:hover  { background:rgba(212,168,83,.1); }
.spread-btn.active { background:rgba(212,168,83,.18); }

.lang-grp { display:flex; gap:4px; }
.lbtn {
  background:transparent; border:1px solid #352b18; color:#5a4828;
  padding:4px 9px; border-radius:4px; cursor:pointer; font-size:.68rem;
  transition:all .2s;
}
.lbtn.on { border-color:#d4a853; color:#d4a853; background:rgba(212,168,83,.08); }

/* ── MAP WRAPPER (fills remaining card height) ───────────── */
.map-aspect {
  width: 100%;
  flex: 1;
  position: relative;
  min-height: 0;
  background: #080604;
  border-bottom: 1px solid #2a2010;
  overflow: hidden;
}
.map-inner {
  position: absolute;
  inset: 0;
}
#leaflet-map {
  width: 100%;
  height: 100%;
}

/* ── Polygon transitions (fill fade + stroke settle) ─────── */
.leaflet-overlay-pane svg path {
  transition: fill-opacity .65s ease-in-out, stroke-opacity .45s ease-in-out,
              stroke-width .5s ease-in-out, filter .55s ease-in-out;
}
.leaflet-tile-pane {
  filter: brightness(1.4) saturate(.5) contrast(.95);
}

/* ── MAP UI BUTTONS ─────────────────────────────────────── */
.map-play-btn {
  position:absolute; bottom:clamp(12px,2vw,18px); right:clamp(56px,7vw,70px); z-index:600;
  width:clamp(42px,5vw,54px); height:clamp(42px,5vw,54px); border-radius:50%;
  background:#d4a853; border:none; color:#14100b;
  font-size:clamp(1rem,2vw,1.3rem); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 22px rgba(212,168,83,.5);
  transition:transform .15s, box-shadow .15s;
}
.map-play-btn:hover { transform:scale(1.08); box-shadow:0 6px 28px rgba(212,168,83,.7); }


/* ── LEGEND ─────────────────────────────────────────────── */
.legend {
  position:absolute; bottom:clamp(10px,2vw,18px); left:clamp(10px,2vw,14px); z-index:500;
  background:rgba(10,8,4,.88); border:1px solid #2a2010;
  border-radius:8px; padding:8px 12px; backdrop-filter:blur(6px);
}
.leg-title { font-family:'Cinzel',sans-serif; font-size:.55rem; letter-spacing:1px; text-transform:uppercase; color:#4a3820; margin-bottom:7px; }
.leg-row { display:flex; align-items:center; gap:7px; margin-bottom:5px; font-size:.68rem; color:#7a6030; cursor:pointer; transition:opacity .2s; }
.leg-row:last-child { margin-bottom:0; }
.leg-row.off { opacity:.3; }
.leg-swatch { width:11px; height:11px; border-radius:2px; flex-shrink:0; }
/* ── TABLET (iPad / small laptop) ────────────────────────── */
@media (max-width:900px) {
  .controls { padding:clamp(10px,2vw,18px) clamp(14px,2.5vw,22px) clamp(12px,2vw,18px); padding-right:52px; }
  .yr-circles-wrap { --dot-sz:30px; --dash-sz:8px; }
}

/* ── MOBILE ──────────────────────────────────────────────── */
@media (max-width:600px) {
  body { padding:0; }
  .card { border-radius:0; border-left:none; border-right:none; }

  .header { padding:8px 12px; gap:6px; }
  .arabic { font-size:1.3rem; }
  .latin  { display:none; }
  .spread-btn { padding:5px 11px; font-size:.52rem; gap:5px; }
  .lang-grp { gap:3px; }
  .lbtn { padding:3px 7px; font-size:.62rem; }

  .controls { padding:8px 12px 10px; padding-right:46px; }
  .year-num { font-size:1.5rem; }
  .era-row  { font-size:.65rem; margin-bottom:8px; }

  .yr-circles-wrap { --dot-sz:26px; --dash-sz:5px; }

  .filter-row { gap:4px; flex-wrap:nowrap; overflow-x:auto; scrollbar-width:none; padding-bottom:2px; }
  .filter-row::-webkit-scrollbar { display:none; }
  .fbtn { padding:4px 9px; font-size:.5rem; letter-spacing:1px; white-space:nowrap; }
  .fdot { width:5px; height:5px; }

  .legend { display:none; }
  .yr-popup-card { max-width:90px; padding:5px 8px; }
  .yr-popup-title { font-size:.54rem; }
}

@media (max-width:380px) {
  .yr-circles-wrap { --dot-sz:22px; --dash-sz:4px; }
  .spread-btn span:last-child { display:none; }
}
.leg-sep { border:none; border-top:1px solid #2a2010; margin:6px 0 5px; }
.leg-row.route { cursor:default; }
.leg-line { flex-shrink:0; }

/* ── REGION LABELS on map ────────────────────────────────── */
.rl { pointer-events:none !important; background:transparent; border:none; box-shadow:none; }
.rl-t { font-family:'Cinzel',sans-serif; font-size:clamp(.48rem,.6vw,.6rem); font-weight:700; letter-spacing:1.5px; text-transform:uppercase; white-space:nowrap; text-shadow:0 1px 4px #000,0 0 8px #000; }

/* ── CONTROLS ─────────────────────────────────────────────── */
.controls {
  padding: clamp(14px,2.5vw,22px) clamp(16px,3vw,28px) clamp(16px,2.5vw,24px);
  padding-right: clamp(50px,7vw,64px); /* leave room for the vertical year strip */
}
.year-row { text-align:center; margin-bottom:2px; }
.year-num {
  font-family:'Cinzel',Georgia,serif;
  font-size:clamp(1.8rem,5vw,3.4rem);
  font-weight:700; color:#d4a853; letter-spacing:.12em; line-height:1;
}
.era-row {
  text-align:center; font-style:italic; color:#7a6030;
  font-family:'Cormorant Garamond','Georgia',serif;
  font-size:clamp(.75rem,1.2vw,.9rem); margin-bottom:clamp(14px,2.5vw,20px);
  letter-spacing:.3px;
}
.era-star { color:#d4a853; font-style:normal; }

/* ── YEAR STRIP — vertical pillar on right edge, all devices ── */
.yr-circles-wrap {
  --dot-sz: 34px;
  --dash-sz: 10px;
  position:fixed; right:6px; top:clamp(46px,7vh,64px);
  z-index:450; margin:0;
  display:flex; flex-direction:row; align-items:flex-start; gap:4px; width:auto;
}
/* Vertical scrubber — thin bar to the left of the circles */
.yr-scrubber {
  writing-mode:vertical-lr;
  -webkit-appearance:none; appearance:none;
  width:4px; flex-shrink:0;
  height:calc(10 * var(--dot-sz) + 9 * var(--dash-sz) + 12px);
  border-radius:2px;
  background:linear-gradient(to bottom, #d4a853 calc(var(--pct)*1%), #2a2010 calc(var(--pct)*1%));
  outline:none; cursor:pointer;
}
.yr-scrubber::-webkit-slider-thumb {
  -webkit-appearance:none; width:14px; height:14px;
  border-radius:50%; background:#d4a853; cursor:pointer;
  box-shadow:0 0 6px rgba(212,168,83,.6);
}
.yr-scrubber::-moz-range-thumb {
  width:14px; height:14px; border-radius:50%;
  background:#d4a853; border:none; cursor:pointer;
}
.yr-circles {
  overflow-y:auto; overflow-x:hidden;
  padding:6px 4px;
  height:calc(10 * var(--dot-sz) + 9 * var(--dash-sz) + 12px);
  background:#0e0b06; border-radius:40px; border:1px solid #2a2010;
  user-select:none; touch-action:pan-y;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none; width:auto;
}
.yr-circles::-webkit-scrollbar { display:none; }
.yr-circles-inner {
  display:flex; flex-direction:column; align-items:center; gap:0;
  padding:4px 0;
}
.yr-dot-wrap { display:flex; flex-direction:column; align-items:center; flex-shrink:0; }
.yr-dot {
  width:var(--dot-sz); height:var(--dot-sz); border-radius:50%;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  font-family:'Cinzel',Georgia,serif; font-size:.65rem; font-weight:600;
  cursor:pointer; border:1.5px solid #352b18; color:#4a3a18;
  background:transparent; transition:all .18s;
}
.yr-dot:hover { border-color:#6a5828; color:#8a6828; }
.yr-dot.active {
  background:#d4a853; border-color:#d4a853; color:#0b0907;
  box-shadow:0 0 10px rgba(212,168,83,.55);
}
.yr-dot.current-ah { border-color:#6a9a53; color:#6a9a53; }
.yr-dot.current-ah.active { background:#6a9a53; border-color:#6a9a53; color:#0b0907; }
.yr-dash { width:0; height:var(--dash-sz); flex-shrink:0; border-left:2px dashed #1e1808; }
.yr-dash.passed { border-left-color:#3a2a10; }

/* Year popup */
.yr-popup {
  margin-bottom:10px; display:flex; flex-direction:row; align-items:flex-start;
  gap:6px; overflow-x:auto; scrollbar-width:none;
}
.yr-popup::-webkit-scrollbar { display:none; }
.yr-popup-hdr { display:none; }
.yr-popup-close {
  background:none; border:none; color:#4a3a18; cursor:pointer; font-size:.75rem;
  padding:0 2px; line-height:1; flex-shrink:0; align-self:center;
}
.yr-popup-close:hover { color:#d4a853; }
.yr-popup-card {
  display:flex; flex-direction:column; align-items:center; gap:4px; flex-shrink:0;
  background:#1a1610; border:1px solid #2a2010; border-radius:8px;
  padding:6px 10px; cursor:pointer; transition:border-color .18s, background .18s;
  max-width:110px; text-align:center;
}
.yr-popup-card:hover { border-color:#5a4828; background:#211a0e; }
.yr-popup-num {
  font-family:'Cinzel',serif; font-size:.55rem; font-weight:700; color:#d4a853;
}
.yr-popup-icon { font-size:.85rem; }
.yr-popup-title {
  font-family:'Cinzel',serif; font-size:.58rem; color:#a08040;
  letter-spacing:.1px; line-height:1.35;
}

/* Filters */
.filter-row { display:flex; gap:clamp(4px,1vw,8px); flex-wrap:wrap; }
.fbtn {
  background:transparent; border:1.5px solid; border-radius:20px;
  padding:clamp(4px,.8vw,6px) clamp(8px,1.5vw,14px);
  font-family:'Cinzel',sans-serif; font-size:clamp(.52rem,.7vw,.65rem);
  letter-spacing:1.5px; text-transform:uppercase; cursor:pointer;
  transition:all .18s; display:flex; align-items:center; gap:6px;
}
.fdot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.fbtn.all { border-color:#d4a853; color:#d4a853; }
.fbtn.all.on { background:rgba(212,168,83,.15); }
.fbtn[data-t="battle"]   { border-color:#7a1810; color:#c06060; }
.fbtn[data-t="treaty"]   { border-color:#14407a; color:#4888c0; }
.fbtn[data-t="journey"]  { border-color:#6a4a08; color:#b08828; }
.fbtn[data-t="conquest"] { border-color:#083820; color:#30a860; }
.fbtn[data-t="event"]    { border-color:#3a0858; color:#8840a8; }
.fbtn.on[data-t="battle"]   { background:rgba(192,57,43,.22); }
.fbtn.on[data-t="treaty"]   { background:rgba(36,113,163,.22); }
.fbtn.on[data-t="journey"]  { background:rgba(212,172,13,.22); }
.fbtn.on[data-t="conquest"] { background:rgba(30,132,73,.22); }
.fbtn.on[data-t="event"]    { background:rgba(125,60,152,.22); }

/* ── EVENT FULL PAGE ─────────────────────────────────────── */
.event-page {
  position:fixed; inset:0; z-index:2000;
  background:#0b0907; overflow-y:auto;
  animation: epFadeIn .3s ease;
}
@keyframes epFadeIn { from{opacity:0;transform:translateX(40px)} to{opacity:1;transform:translateX(0)} }
.ep-header {
  display:flex; align-items:center; gap:14px;
  padding:16px 20px; border-bottom:1px solid #2a2010;
  position:sticky; top:0; background:#0b0907; z-index:10;
}
.ep-back {
  background:#1a1610; border:1px solid #2a2010; color:#d4a853;
  border-radius:6px; padding:6px 14px; cursor:pointer;
  font-family:'Cinzel',serif; font-size:.7rem; letter-spacing:1px;
  transition:border-color .18s;
}
.ep-back:hover { border-color:#5a4828; }
.ep-header-title {
  font-family:'Cinzel',serif; font-size:.85rem; color:#a08040;
  letter-spacing:.5px;
}
.ep-body { padding:24px 20px; max-width:680px; margin:0 auto; }
.ep-icon { font-size:2.8rem; margin-bottom:10px; }
.ep-title {
  font-family:'Cinzel',serif; font-size:clamp(1.1rem,3vw,1.6rem);
  font-weight:700; color:#d4a853; line-height:1.3; margin-bottom:6px;
}
.ep-title-ar {
  font-size:1.2rem; color:#7a6030; margin-bottom:10px;
  font-family:serif; direction:rtl;
}
.ep-badge {
  display:inline-block; border-radius:20px; padding:3px 12px;
  font-family:'Cinzel',serif; font-size:.6rem; letter-spacing:1.2px;
  text-transform:uppercase; margin-bottom:14px;
}
.ep-meta {
  display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px;
  font-family:'Cinzel',serif; font-size:.68rem; color:#5a4828;
}
.ep-meta span { background:#1a1610; border:1px solid #2a2010; border-radius:4px; padding:3px 10px; }
.ep-summary {
  font-family:'Cormorant Garamond',Georgia,serif; font-size:1rem;
  color:#c8a870; line-height:1.7; margin-bottom:22px;
}
.ep-section-title {
  font-family:'Cinzel',serif; font-size:.65rem; letter-spacing:1.8px;
  text-transform:uppercase; color:#5a4828; margin-bottom:10px;
  border-bottom:1px solid #1e1808; padding-bottom:5px;
}
.ep-list { list-style:none; padding:0; margin:0 0 22px; display:flex; flex-direction:column; gap:6px; }
.ep-list li {
  background:#1a1610; border:1px solid #2a2010; border-radius:6px;
  padding:8px 12px; font-family:'Cormorant Garamond',Georgia,serif;
  font-size:.95rem; color:#a08040; display:flex; align-items:flex-start; gap:8px;
}
.ep-list li::before { content:'›'; color:#d4a853; flex-shrink:0; }
.ep-participants { margin-bottom:22px; display:flex; flex-direction:column; gap:6px; }
.ep-person {
  background:#1a1610; border:1px solid #2a2010; border-radius:6px;
  padding:8px 12px; display:flex; justify-content:space-between; align-items:center;
}
.ep-person-name { font-family:'Cinzel',serif; font-size:.68rem; color:#d4a853; }
.ep-person-role { font-family:'Cormorant Garamond',Georgia,serif; font-size:.85rem; color:#5a4828; font-style:italic; }
.ep-quran {
  background:#1a1610; border:1px solid #2a2010; border-radius:6px;
  padding:10px 14px; margin-bottom:22px;
  font-family:'Cinzel',serif; font-size:.7rem; color:#d4a853; letter-spacing:.5px;
}
.ep-sources { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:32px; }
.ep-source {
  background:#1a1610; border:1px solid #2a2010; border-radius:20px;
  padding:3px 12px; font-family:'Cormorant Garamond',Georgia,serif;
  font-size:.82rem; color:#5a4828;
}

/* ── UNIT PAGE (Khan Academy light theme) ────────────────── */
.unit-page {
  position:fixed; inset:0; z-index:2000;
  background:#fff; overflow-y:auto;
  animation:epFadeIn .25s ease;
  color:#1a1a1a;
}
.unit-page .ep-back {
  background:#fff; border:1px solid #d6d6d6; color:#333;
  border-radius:4px; padding:6px 14px; cursor:pointer;
  font-family:'Inter','Segoe UI',sans-serif; font-size:.8rem; letter-spacing:0;
  transition:background .15s;
}
.unit-page .ep-back:hover { background:#f0f0f0; border-color:#aaa; }
.unit-page .ep-header-title {
  font-family:'Inter','Segoe UI',sans-serif; font-size:.85rem; color:#666;
}
.up-header {
  display:flex; align-items:center; gap:14px;
  padding:14px 24px; border-bottom:1px solid #e8e8e8;
  position:sticky; top:0; background:#fff; z-index:10;
}
.up-body { max-width:640px; margin:0 auto; padding:0 0 60px; }
/* One section per event */
.up-section {
  padding:32px 24px 28px;
  border-bottom:8px solid #f0f0f0;
}
.up-section.active { background:#fafafa; }
.up-section-title {
  font-family:'Inter','Segoe UI',sans-serif; font-size:clamp(1.2rem,4vw,1.7rem);
  font-weight:700; color:#1a1a1a; line-height:1.25; margin-bottom:12px;
}
.up-section-desc {
  font-family:'Inter','Segoe UI',sans-serif; font-size:.95rem;
  color:#555; line-height:1.7; margin-bottom:24px; white-space:pre-line;
}
/* Sub-item list */
.up-item-list { display:flex; flex-direction:column; margin-bottom:24px; }
.up-item-row {
  display:flex; align-items:center; gap:14px;
  padding:12px 0; border-bottom:1px solid #e8e8e8;
}
.up-item-row:first-child { border-top:1px solid #e8e8e8; }
.up-item-icon {
  width:36px; height:36px; flex-shrink:0;
  border:1.5px solid #b0b0b0; border-radius:4px;
  background:#fff; display:flex; align-items:center;
  justify-content:center; font-size:.95rem; color:#555;
}
.up-item-label {
  font-family:'Inter','Segoe UI',sans-serif; font-size:.93rem;
  color:#3a3a3a; line-height:1.4;
}
/* Practice card */
.up-practice-card {
  display:flex; align-items:stretch;
  border:1px solid #d6d6d6; border-radius:6px; overflow:hidden;
  background:#f7f8fa;
}
.up-pc-left {
  flex:1; padding:14px 18px; background:transparent;
  display:flex; flex-direction:column; gap:11px;
}
.up-pc-title {
  font-family:'Inter','Segoe UI',sans-serif; font-size:.82rem; font-weight:700;
  color:#1a1a1a; line-height:1.4;
}
.up-pc-btn {
  width:fit-content; background:#fff;
  border:2px solid #1865f2; color:#1865f2;
  border-radius:4px; padding:7px 18px; cursor:pointer;
  font-family:'Inter','Segoe UI',sans-serif; font-size:.8rem; font-weight:600;
  letter-spacing:0; transition:background .15s;
}
.up-pc-btn:hover { background:#e8f0fe; }
.up-pc-right {
  width:96px; background:#f0f0f0; border-left:1px solid #d6d6d6;
  display:flex; align-items:center; justify-content:center; text-align:center;
}
.up-pc-status {
  font-family:'Inter','Segoe UI',sans-serif; font-size:.78rem; color:#666;
  line-height:1.5;
}
.up-item-row.clickable { cursor:pointer; }
.up-item-row.clickable:hover { background:#eef2ff; border-radius:4px; }
.up-item-row.clickable .up-item-label { color:#1865f2; }
.up-item-row.clickable .up-item-icon { border-color:#1865f2; color:#1865f2; }

/* ── EVENT INFO CARD (bottom panel) ──────────────────────── */
.ev-overlay {
  position:absolute;
  bottom:0; left:0; right:0;
  max-height:42%;
  background:rgba(8,6,3,.96);
  border-top:1px solid #2a2010;
  z-index:800;
  overflow-y:auto;
  transform:translateY(100%);

function initMap(el) {
  const map = L.map(el, {
    preferCanvas: false,
    zoomControl: true,
    scrollWheelZoom: true,
    doubleClickZoom: true,
  });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd', maxZoom: 19,
    attribution: '© CARTO'
  }).addTo(map);
  return map;
}

function fitFullBounds(map) {
  const el = map.getContainer();
  const w = el.offsetWidth, h = el.offsetHeight;
  const px = Math.max(20, Math.round(w * 0.04));
  const py = Math.max(16, Math.round(h * 0.05));
  map.fitBounds(FULL_BOUNDS, { padding: [py, px], animate: false });
}

function buildEmpireLayers(map) {
  const layers = [];
  BYZANTINE_POLYS.forEach(c =>
    layers.push(L.polygon(c, {color:'#3355bb',weight:1,dashArray:'6,5',fillColor:'#4466dd',fillOpacity:.12,opacity:.45}).addTo(map)));
  SASSANID_POLYS.forEach(c =>
    layers.push(L.polygon(c, {color:'#aa3311',weight:1,dashArray:'6,5',fillColor:'#cc5522',fillOpacity:.12,opacity:.45}).addTo(map)));
  FREE_ARABIA_POLYS.forEach(c =>
    layers.push(L.polygon(c, {color:'#997710',weight:1,dashArray:'4,6',fillColor:'#cc9922',fillOpacity:.08,opacity:.4}).addTo(map)));
  return layers;
}

function buildExpansionLayers(map) {
  _expMap = map;
  // Create all zones at opacity 0; visibility controlled by setStyle
  return EXPANSION_ZONES.map(zone => {
    const polys = zone.polys.map(c =>
      L.polygon(c, {color:'#1a7a40',weight:0.8,dashArray:'4,6',fillColor:'#1e8449',fillOpacity:0,opacity:0}).addTo(map)
    );
    return { id: zone.id, fromYear: zone.fromYear, polys };
  });
}

// ── Expansion animation state ─────────────────────────────
let _expAnimated = new Set();  // zone IDs that have already revealed
let _expLastYear = 0;
let _expMap      = null;       // Leaflet map reference, set in buildExpansionLayers

// Wave entrance: territory grows radially from its bounding-box centre.
function animateZoneIn(poly, delayMs) {
  const path = poly.getElement();
  if (!path) return;
  setTimeout(() => {
    let len = 0;
    try { len = path.getTotalLength(); } catch(e) {}
    // Duration scales with perimeter: small zones ~850ms, large zones ~1300ms
    const dur = Math.min(1300, Math.max(850, len * 0.75));

    // Set final visual state immediately — clip-path acts as the reveal mask.
    // Overriding the CSS class transition to 'none' ensures fillOpacity jumps
    // instantly (no unwanted fade while the clip circle is still at 0%).
    poly.setStyle({ opacity: 1, fillOpacity: 0.18 });
    path.style.transition = 'none';
    path.style.clipPath   = 'circle(0% at 50% 50%)';
    path.getBoundingClientRect();  // force reflow so start-state is committed

    // Phase 1 — radial wave: clip circle expands from centre to full coverage.
    // Only clip-path is transitioned; fill-opacity changes remain instant.
    path.style.transition = `clip-path ${dur}ms cubic-bezier(0.15, 0, 0.30, 1)`;
    requestAnimationFrame(() => {
      path.style.clipPath = 'circle(150% at 50% 50%)';
    });

    // Phase 2 — after wave settles: glow pulse then ease back, border thickens.
    setTimeout(() => {
      path.style.clipPath   = '';  // clip no longer needed; restore natural rendering

      // Glow pulse: briefly brighten fill, then ease back to resting opacity
      path.style.transition = 'fill-opacity 160ms ease-out';
      poly.setStyle({ fillOpacity: 0.28 });
      setTimeout(() => {
        path.style.transition = 'fill-opacity 550ms ease-in-out';
        poly.setStyle({ fillOpacity: 0.18 });
        setTimeout(() => { path.style.transition = ''; }, 600);
      }, 200);

      // Border pulse: briefly thicken then settle back via CSS ease-in-out
      path.style.strokeWidth = '3.5px';
      setTimeout(() => { path.style.strokeWidth = ''; }, 300);
    }, dur + 40);
  }, delayMs);
}

function updateExpansionLayers(expansionLayers, year, islamicOn = true) {
  if (!islamicOn) {
    expansionLayers.forEach(zone => zone.polys.forEach(p => p.setStyle({ fillOpacity: 0, opacity: 0 })));
    return;
  }
  // When scrubbing backward, forget animations for zones now out of range
  if (year < _expLastYear) {
    for (const id of [..._expAnimated]) {
      const zone = EXPANSION_ZONES.find(z => z.id === id);
      if (zone && zone.fromYear > year) _expAnimated.delete(id);
    }
  }
  const prevYear  = _expLastYear;
  _expLastYear    = year;

  let stagger = 0;
  expansionLayers.forEach(zone => {
    const vis   = zone.fromYear <= year;
    const isNew = vis && !_expAnimated.has(zone.id) && year > prevYear;

    if (isNew) {
      // First time this zone appears — animate it in
      _expAnimated.add(zone.id);
      zone.polys.forEach(p => {
        p.setStyle({ opacity: 0, fillOpacity: 0 });   // fully hidden until wave begins
        animateZoneIn(p, stagger);
        stagger += 160;   // slight stagger between multiple polygons / zones
      });
    } else if (vis) {
      // Already revealed — jump to final state (handles rebuilds & backward scrubs)
      zone.polys.forEach(p => {
        const path = p.getElement();
        if (path) { path.style.clipPath = ''; path.style.transition = ''; }
        p.setStyle({ fillOpacity: 0.18, opacity: 1 });
      });
    } else {
      // Not yet in timeline — keep hidden
      zone.polys.forEach(p => p.setStyle({ fillOpacity: 0, opacity: 0 }));
    }
  });
}

function updateEmpireLayerVis(empireLayers, byzantineOn, sassanidOn, arabiaOn) {
  // Byzantine = first BYZANTINE_POLYS.length layers
  const bl = BYZANTINE_POLYS.length, sl = SASSANID_POLYS.length, al = FREE_ARABIA_POLYS.length;
  empireLayers.slice(0, bl).forEach(l => l.setStyle({ fillOpacity: byzantineOn ? .12 : 0, opacity: byzantineOn ? .45 : 0 }));
  empireLayers.slice(bl, bl+sl).forEach(l => l.setStyle({ fillOpacity: sassanidOn ? .12 : 0, opacity: sassanidOn ? .45 : 0 }));
  empireLayers.slice(bl+sl, bl+sl+al).forEach(l => l.setStyle({ fillOpacity: arabiaOn ? .08 : 0, opacity: arabiaOn ? .4 : 0 }));
}

/* ══════════════════════════════════════════════════════════
   ANIMATED CAMPAIGN ROUTES
══════════════════════════════════════════════════════════ */
let _rtLayers   = [];          // { main: Polyline, glow: Polyline|null }[]
let _rtAnimated = new Set();   // route IDs already drawn in this session
let _rtLastYear = 0;

// A small glowing dot that travels the route while it draws.
function addTravelDot(map, pts, color, duration) {
  const dot = L.circleMarker(pts[0], {
    radius: 4.5, fillColor: color, fillOpacity: 1,
    color: '#fff', weight: 1.5, opacity: 0.95, interactive: false,
  }).addTo(map);

  let cum = 0;
  const segs = [];
  for (let i = 1; i < pts.length; i++) {
    const a = pts[i-1], b = pts[i], d = Math.hypot(b[0]-a[0], b[1]-a[1]);
    segs.push({ a, b, d, cs: cum }); cum += d;
  }
  const totalLen = cum;
  const t0 = performance.now();

  function tick(now) {
    const p   = Math.min((now - t0) / duration, 1);
    const tgt = p * totalLen;
    let pos   = L.latLng(...pts[pts.length - 1]);
    for (const s of segs) {
      if (s.cs + s.d >= tgt) {
        const f = s.d > 0 ? (tgt - s.cs) / s.d : 0;
        pos = L.latLng(s.a[0] + (s.b[0]-s.a[0])*f, s.a[1] + (s.b[1]-s.a[1])*f);
        break;
      }
    }
    dot.setLatLng(pos);
    if (p < 1) requestAnimationFrame(tick); else map.removeLayer(dot);
  }
  requestAnimationFrame(tick);
}

function buildAnimatedRoutes(map, year, filters) {
  // Remove all previous route layers
  _rtLayers.forEach(({ main, glow }) => {
    map.removeLayer(main);
    if (glow) map.removeLayer(glow);
  });
  _rtLayers = [];

  // Forget animation state for routes that have scrolled out of view
  if (year < _rtLastYear) {
    const stillVis = new Set(
      CAMPAIGN_ROUTES
        .filter(r => { const e = EVENTS.find(x => x.id === r.evId); return e && e.year <= year && filters.has(e.type); })
        .map(r => r.id)
    );
    for (const id of [..._rtAnimated]) { if (!stillVis.has(id)) _rtAnimated.delete(id); }
  }
  const prevYear  = _rtLastYear;
  _rtLastYear     = year;

  CAMPAIGN_ROUTES.forEach(route => {
    const ev = EVENTS.find(e => e.id === route.evId);
    if (!ev || ev.year > year || !filters.has(ev.type)) return;

    const st  = ROUTE_STYLES[route.cat];
    const pts = route.pts;

    // Glow layer (journeys only — wide, feather-soft halo)
    const glow = st.glow
      ? L.polyline(pts, { color: st.color, weight: 9, opacity: 0.12, interactive: false }).addTo(map)
      : null;

    const main = L.polyline(pts, {
      color: st.color, weight: st.weight, opacity: 0.80, interactive: false,
    }).addTo(map);

    _rtLayers.push({ main, glow });

    const isNew = !_rtAnimated.has(route.id) && year > prevYear;

    if (isNew) {
      _rtAnimated.add(route.id);

      // Animation duration proportional to geographic length of route
      const dist = pts.reduce((acc, p, i) =>
        i === 0 ? 0 : acc + Math.hypot(p[0]-pts[i-1][0], p[1]-pts[i-1][1]), 0);
      const dur = Math.max(900, Math.min(2400, dist * 90));

      requestAnimationFrame(() => {
        [main, glow].filter(Boolean).forEach(poly => {
          const path = poly.getElement(); if (!path) return;
          const len = path.getTotalLength();
          path.style.strokeDasharray  = `${len} ${len}`;
          path.style.strokeDashoffset = len;
          path.style.transition = 'none';
          path.getBoundingClientRect();   // force reflow
          path.style.transition = `stroke-dashoffset ${dur}ms cubic-bezier(0.4,0,0.15,1)`;
          path.style.strokeDashoffset = '0';
        });

        addTravelDot(map, pts, st.color, dur);

        // After draw completes, swap in the decorative dash pattern
        if (st.dashFinal) {
          setTimeout(() => {
            const path = main.getElement(); if (!path) return;
            path.style.transition       = 'none';
            path.style.strokeDasharray  = st.dashFinal;
            path.style.strokeDashoffset = '0';
          }, dur + 60);
        }
      });
    } else {
      // Already drawn — jump straight to final appearance
      requestAnimationFrame(() => {
        const mp = main.getElement();
        if (mp) { mp.style.strokeDasharray = st.dashFinal || ''; mp.style.strokeDashoffset = '0'; }
        if (glow) { const gp = glow.getElement(); if (gp) { gp.style.strokeDasharray = ''; gp.style.strokeDashoffset = '0'; } }
      });
    }
  });
}

let _markerLayers = [];
let _globalMap    = null;
let _hoverCard    = null;

function initHoverCard(map) {
  if (_hoverCard && _hoverCard.isConnected) return;
  _hoverCard = null;
  const div = document.createElement('div');
  div.className = 'marker-hover-card';
  div.style.display = 'none';
  map.getContainer().appendChild(div);
  _hoverCard = div;
  // Hide when clicking anywhere on map (but not the card itself)
  map.getContainer().addEventListener('click', (e) => {
    if (!e.target.closest('.marker-hover-card')) {
      _hoverCard.style.display = 'none';
    }
  });
  // Hide on map move/zoom
  map.on('movestart', () => { _hoverCard.style.display = 'none'; });
}

function buildMarkers(map, year, filters, lang, onSelect, selectedId) {
  window._onMarkerSelect = (id) => { if (window._onReadPage) window._onReadPage(id); };
  _markerLayers.forEach(l => map.removeLayer(l));
  _markerLayers = [];

  const vis = EVENTS.filter(e => e.year <= year && filters.has(e.type));

  // Group by location
  const byLoc = {};
  vis.forEach(ev => { if (!byLoc[ev.loc]) byLoc[ev.loc]=[]; byLoc[ev.loc].push(ev); });

  Object.entries(byLoc).forEach(([lid, evts]) => {
    const loc = LOCS[lid]; if (!loc) return;
    evts.forEach((ev, i) => {
      const lat = loc.lat + i * 0.14, lng = loc.lng + i * 0.06;
      const sel = ev.id === selectedId;
      const c = TYPES[ev.type].color;
      const sz = sel ? 12 : 8;

      // Dot marker with glow
      const icon = L.divIcon({
        className: '',
        html: `<div class="mdot${sel?' sel':''}" style="width:${sz}px;height:${sz}px;background:${c};--mc:${c};${sel?`box-shadow:0 0 0 3px rgba(212,168,83,.45),0 0 14px ${c};`:''}"></div>`,
        iconSize: [sz,sz], iconAnchor: [sz/2,sz/2], popupAnchor: [0,-sz-2]
      });

      // Location label (only first event at loc)
      if (i === 0) {
        const locName = lang==='ru' ? (loc.ru||loc.en) : loc.en;
        const lblIcon = L.divIcon({
          className: '',
          html: `<div style="font-size:clamp(.5rem,.6vw,.6rem);font-weight:700;letter-spacing:1.2px;text-transform:uppercase;white-space:nowrap;color:rgba(255,255,255,.75);text-shadow:0 1px 4px #000,0 0 6px #000;pointer-events:none;margin-left:${sz/2+3}px;margin-top:-${sz/2}px;">${locName}</div>`,
          iconAnchor:[0,0]
        });
        const lbl = L.marker([lat,lng],{icon:lblIcon,interactive:false,zIndexOffset:-100}).addTo(map);
        _markerLayers.push(lbl);
      }

      const readLabel = lang==='ru' ? 'Читать' : 'Read';
      const m = L.marker([lat,lng], { icon, zIndexOffset: sel?1000:0 }).addTo(map);
      initHoverCard(map);
      m.on('mouseover', function() {
        if (map.getZoom() < 6) return;
        const pt = map.latLngToContainerPoint([lat, lng]);
        _hoverCard.innerHTML =
          `<div class="mktt">` +
          `<div class="mktt-title">${ev.icon} ${ev.title[lang]||ev.title.en}</div>` +
          `<button class="mktt-read" onclick="window._onMarkerSelect('${ev.id}')">${readLabel}</button>` +
          `</div>`;
        _hoverCard.style.display = 'block';
        const w = _hoverCard.offsetWidth || 140;
        _hoverCard.style.left = (pt.x - w - 8) + 'px';
        _hoverCard.style.top  = (pt.y + 8) + 'px';
      });
      m.on('click', () => onSelect(ev.id));
      _markerLayers.push(m);
    });
  });
}

/* ══════════════════════════════════════════════════════════
   CINEMATIC FLY-TO
══════════════════════════════════════════════════════════ */
function cinematicFlyTo(map, lat, lng, zoom) {
  const el  = map.getContainer();
  const h   = el.offsetHeight;
  const targetZoom = zoom != null ? zoom : Math.max(map.getZoom(), 7);
  // Shift the map center downward in screen space by ~20% of map height.
  // This places the marker in the upper third of the viewport, just above
  // the info panel that slides up from the bottom.
  const offsetPx = h * 0.20;
  const pt      = map.project(L.latLng(lat, lng), targetZoom);
  const shifted = map.unproject(L.point(pt.x, pt.y + offsetPx), targetZoom);
  map.flyTo(shifted, targetZoom, {
    animate:      true,
    duration:     2.2,
    easeLinearity: 0.12,
  });
}

/* ══════════════════════════════════════════════════════════
   MAP COMPONENT (React wrapper for Leaflet)
══════════════════════════════════════════════════════════ */
function MapView({ year, filters, lang, selectedId, layerVis, onSelect, onReadPage }) {
  const mountRef = useRef(null);
  const mapRef = useRef(null);
  const empireRef = useRef(null);
  const expansionRef = useRef(null);
  // Keep callbacks fresh
  const onSelectRef = useRef(onSelect);
  useEffect(() => { onSelectRef.current = onSelect; }, [onSelect]);
  useEffect(() => { window._onReadPage = onReadPage; }, [onReadPage]);
  // Track previous selection to avoid re-flying on unrelated re-renders
  const prevSelectedRef = useRef(null);

  // Initialize Leaflet (once)
  useEffect(() => {
    const map = initMap(mountRef.current);
    mapRef.current = map;
    _globalMap = map;
    window._flyToEvent = (evId) => {
      const ev  = EVENTS.find(e => e.id === evId);
      if (!ev) return;
      const loc = LOCS[ev.loc];
      if (!loc) return;
      map.flyTo([loc.lat, loc.lng], 7, { animate: true, duration: 2.2, easeLinearity: 0.12 });
    };
    window._flyToDefault = () => {
      const el = map.getContainer();
      const w = el.offsetWidth, h = el.offsetHeight;
      const px = Math.max(20, Math.round(w * 0.04));
      const py = Math.max(16, Math.round(h * 0.05));
      map.flyToBounds(FULL_BOUNDS, { padding: [py, px], duration: 1.8, easeLinearity: 0.15 });
    };
    empireRef.current  = buildEmpireLayers(map);
    expansionRef.current = buildExpansionLayers(map);

    fitFullBounds(map);

    const ro = new ResizeObserver(() => {
      requestAnimationFrame(() => {
        map.invalidateSize({ animate: false });
        fitFullBounds(map);
      });
    });
    ro.observe(mountRef.current);

    return () => { ro.disconnect(); map.remove(); mapRef.current = null; };
  }, []);

  // Empire visibility
  useEffect(() => {
    if (!empireRef.current) return;
    updateEmpireLayerVis(empireRef.current, layerVis.byzantine, layerVis.sassanid, layerVis.arabia);
  }, [layerVis.byzantine, layerVis.sassanid, layerVis.arabia]);

  // Expansion zones
  useEffect(() => {
    if (!expansionRef.current) return;
    updateExpansionLayers(expansionRef.current, year, layerVis.islamic);
  }, [year, layerVis.islamic]);

  // Markers, labels, and animated routes
  useEffect(() => {
    if (!mapRef.current) return;
    buildRegionLabels(mapRef.current, lang);
    buildMarkers(mapRef.current, year, filters, lang, (id) => onSelectRef.current(id), selectedId);
    buildAnimatedRoutes(mapRef.current, year, filters);
  }, [year, filters, lang, selectedId]);

  // Cinematic fly-to: only fires when selectedId newly becomes non-null
  useEffect(() => {
    if (!mapRef.current) return;
    if (!selectedId) { prevSelectedRef.current = null; return; }
    if (selectedId === prevSelectedRef.current) return;   // same marker re-selected
    prevSelectedRef.current = selectedId;
    const ev  = EVENTS.find(e => e.id === selectedId);
    if (!ev) return;
    const loc = LOCS[ev.loc];
    if (!loc) return;
    cinematicFlyTo(mapRef.current, loc.lat, loc.lng);
  }, [selectedId]);


  return <div ref={mountRef} style={{ position:'absolute', inset:0 }} />;
}

/* ══════════════════════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════════════════════ */
function App() {
  const [year,       setYear]       = useState(35);
  const [filters,    setFilters]    = useState(new Set(ALL_FILTER_TYPES));
  const [lang,       setLang]       = useState('en');
  const [selectedId, setSelectedId] = useState(null);
  const [isPlaying,  setIsPlaying]  = useState(false);
  const [layerVis,   setLayerVis]   = useState({ byzantine:true, sassanid:true, arabia:true, islamic:true });
  const [popYear,    setPopYear]    = useState(null);
  const [showDetail,  setShowDetail]  = useState(false);
  const [pageEvId,    setPageEvId]    = useState(null);
  const [topicKey,    setTopicKey]    = useState(null);
  const playTimer       = useRef(null);
  const circlesRef      = useRef(null);   // scroll container
  const activeDotRef    = useRef(null);   // active year dot

  // Scroll active dot into center of the timeline strip (works for both horizontal and vertical)
  useEffect(() => {
    const dot = activeDotRef.current;
    const container = circlesRef.current;
    if (!dot || !container) return;
    const vertical = container.scrollHeight > container.clientHeight + 4;
    if (vertical) {
      const target = dot.offsetTop - (container.clientHeight - dot.offsetHeight) / 2;
      container.scrollTo({ top: Math.max(0, target), behavior: 'smooth' });
    } else {
      const target = dot.offsetLeft - (container.clientWidth - dot.offsetWidth) / 2;
      container.scrollTo({ left: Math.max(0, target), behavior: 'smooth' });
    }
  }, [year]);

  // Derived
  const era     = ERAS.find(e => year >= e.from && year < e.to) || ERAS[ERAS.length-1];
  const eraText = lang === 'ru' ? era.ru : era.en;
  const selEv   = selectedId ? EVENTS.find(e => e.id === selectedId) : null;

  // Auto-play
  const startPlay = useCallback(() => {
    setIsPlaying(true);
    let idx = TICKS.indexOf(year);
    if (idx < 0 || idx >= TICKS.length - 1) { idx = 0; setYear(TICKS[0]); }
    playTimer.current = setInterval(() => {
      idx++;
      setYear(TICKS[idx]);
      if (idx >= TICKS.length - 1) { clearInterval(playTimer.current); setIsPlaying(false); }
    }, 550);
  }, [year]);

  const stopPlay = useCallback(() => {
    clearInterval(playTimer.current);
    setIsPlaying(false);
  }, []);

  const togglePlay = useCallback(() => {
    if (isPlaying) stopPlay();
    else startPlay();
  }, [isPlaying, startPlay, stopPlay]);

  useEffect(() => () => clearInterval(playTimer.current), []);

  // If selected event no longer visible, deselect
  useEffect(() => {
    if (selEv && (selEv.year > year || !filters.has(selEv.type))) {
      setSelectedId(null);
    }
  }, [year, filters]);

  const toggleFilter = useCallback((type) => {
    setFilters(prev => {
      const next = new Set(prev);
      if (next.has(type)) next.delete(type); else next.add(type);
      return next;
    });
  }, []);

  const setAllFilters = useCallback(() => {
    setFilters(prev => prev.size === ALL_FILTER_TYPES.length ? new Set() : new Set(ALL_FILTER_TYPES));
  }, []);

  const toggleLayerVis = useCallback((key) => {
    setLayerVis(prev => ({ ...prev, [key]: !prev[key] }));
  }, []);

  const L = lang === 'ru';
  const FTYPES = [
    {t:'battle',  en:'Battles',   ru:'Битвы'},
    {t:'treaty',  en:'Treaties',  ru:'Договоры'},
    {t:'journey', en:'Journeys',  ru:'Походы'},
    {t:'conquest',en:'Conquests', ru:'Завоевания'},
    {t:'event',   en:'Events',    ru:'События'},
  ];

  if (topicKey) {
    return <TopicPage topicKey={topicKey} lang={lang} onBack={() => setTopicKey(null)} />;
  }
  if (pageEvId) {
    return <UnitPage focusId={pageEvId} lang={lang} onBack={() => setPageEvId(null)} onTopicClick={(k) => setTopicKey(k)} />;
  }

  return (
    <div className="card">
      {/* HEADER */}
      <div className="header">
        <div className="header-left">
          <span className="arabic">سيرة</span>
          <span className="latin">Sirah Map</span>
        </div>
        <div className="header-right">
          <button className={`spread-btn${isPlaying?' active':''}`} onClick={togglePlay}>
            <span>{isPlaying ? '⏹' : '▶'}</span>
            <span>{isPlaying ? (L?'Стоп':'Stop') : (L?'Распростр.':'Spread')}</span>
          </button>
          <div className="lang-grp">
            <button className={`lbtn${lang==='en'?' on':''}`} onClick={() => setLang('en')}>EN</button>
            <button className={`lbtn${lang==='ru'?' on':''}`} onClick={() => setLang('ru')}>RU</button>
          </div>
        </div>
      </div>

      {/* MAP */}
      <div className="map-aspect">
        <div className="map-inner">
          <div id="leaflet-map">
            <MapView
              year={year}
              filters={filters}
              lang={lang}
              selectedId={selectedId}
              layerVis={layerVis}
              onSelect={(id) => { setSelectedId(id); setShowDetail(true); }}
              onReadPage={(id) => setPageEvId(id)}
            />
          </div>

          {/* Legend */}
          <Legend layerVis={layerVis} onToggle={toggleLayerVis} lang={lang} />

          {/* Play button */}
          <button className="map-play-btn" onClick={togglePlay}>
            {isPlaying ? '⏹' : '▶'}
          </button>

          {/* Event detail overlay (slides up) */}
          {selEv && showDetail && (
            <EventDetail ev={selEv} lang={lang} onClose={() => { setSelectedId(null); setShowDetail(false); }} />
          )}
        </div>
      </div>

      {/* CONTROLS */}
      <div className="controls">
        <div className="year-row">
          <span className="year-num">{year} AH</span>
        </div>
        <div className="era-row">
          {eraText} <span className="era-star">★</span>
        </div>

        {popYear !== null && (() => {
          const evs = EVENTS.filter(e => e.year === popYear);
          if (!evs.length) return null;
          return (
            <div className="yr-popup">
              {evs.map((ev, i) => (
                <div key={ev.id} className="yr-popup-card" onClick={() => {
                  setSelectedId(ev.id);
                  setShowDetail(false);
                  if (window._flyToEvent) window._flyToEvent(ev.id);
                }}>
                  <span className="yr-popup-num">{i+1}</span>
                  <span className="yr-popup-icon">{ev.icon}</span>
                  <span className="yr-popup-title">{L ? ev.title.ru : ev.title.en}</span>
                </div>
              ))}
              <button className="yr-popup-close" onClick={() => setPopYear(null)}>✕</button>
            </div>
          );
        })()}

        <div className="yr-circles-wrap">
          <input
            type="range" className="yr-scrubber"
            min={0} max={TICKS.length - 1} value={TICKS.indexOf(year)}
            style={{'--pct': Math.round(TICKS.indexOf(year) / (TICKS.length - 1) * 100)}}
            onChange={e => {
              const n = TICKS[Number(e.target.value)];
              if (n) setYear(n);
            }}
          />
          <div className="yr-circles" ref={circlesRef}>
            <div className="yr-circles-inner">
              {TICKS.map((n, i) => (
                <div key={n} className="yr-dot-wrap">
                  {i > 0 && <div className={`yr-dash${n <= year ? ' passed' : ''}`}/>}
                  <div
                    ref={n === year ? activeDotRef : null}
                    className={`yr-dot${n === year ? ' active' : ''}${n === CURRENT_AH ? ' current-ah' : ''}`}
                    style={{fontSize: n < 10 ? '.65rem' : n < 100 ? '.6rem' : n < 1000 ? '.48rem' : '.4rem'}}
                    onClick={() => {
                      setYear(n);
                      if (popYear === n) { if (window._flyToDefault) window._flyToDefault(); }
                      else setPopYear(n);
                    }}
                  >{tickLabel(n)}</div>
                </div>
              ))}
            </div>
          </div>
        </div>

        <div className="filter-row">
          <button
            className={`fbtn all${filters.size===ALL_FILTER_TYPES.length?' on':''}`}
            onClick={setAllFilters}
          >
            <div className="fdot" style={{background:'#d4a853'}}/>
            {L?'Все':'All'}
          </button>
          {FTYPES.map(ft => (
            <button
              key={ft.t}
              className={`fbtn${filters.has(ft.t)?' on':''}`}
              data-t={ft.t}
              onClick={() => toggleFilter(ft.t)}
            >
              <div className="fdot" style={{background:TYPES[ft.t].color}}/>
              {L ? ft.ru : ft.en}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
